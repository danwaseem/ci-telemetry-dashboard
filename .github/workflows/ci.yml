name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-and-report:
    name: Test, Lint & Generate Report
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Lint (ruff) ───────────────────────────────────────────────────
      - name: Lint with ruff
        run: ruff check app/ scripts/ tests/

      # ── 5. Format check (black) ──────────────────────────────────────────
      - name: Format check with black
        run: black --check app/ scripts/ tests/

      # ── 6. Run tests ─────────────────────────────────────────────────────
      - name: Run pytest
        run: |
          mkdir -p report/output
          pytest tests/ \
            --junitxml=report/junit.xml \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      # ── 7. Collect telemetry ─────────────────────────────────────────────
      - name: Collect telemetry
        run: |
          python scripts/collect_telemetry.py \
            --junit    report/junit.xml \
            --coverage coverage.xml \
            --output   report/output/telemetry.json

      # ── 8. Generate HTML report ──────────────────────────────────────────
      - name: Generate HTML report
        run: |
          python scripts/generate_report.py \
            --telemetry report/output/telemetry.json \
            --template  report/template/template.html \
            --output    report/output/index.html

      # ── 9. Upload HTML report artifact ───────────────────────────────────
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-telemetry-report
          path: report/output/
          retention-days: 30

      # ── 10. Upload JUnit XML artifact ─────────────────────────────────────
      - name: Upload JUnit XML artifact
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml
          path: report/junit.xml
          retention-days: 30